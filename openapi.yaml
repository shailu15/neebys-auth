openapi: 3.1.0
info:
  title: NeebYs
  version: 1.0.0
  description: NeebYs ChatGPT Integration

servers:
  - url: https://neebys-auth-production.up.railway.app

paths:
  /profile:
    get:
      operationId: getProfile
      summary: Get NeebYs profile
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  app:
                    type: string
                  user:
                    type: string
                  connected:
                    type: boolean