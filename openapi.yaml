openapi: 3.1.0
info:
  title: NeebYs
  version: 1.0.0
  description: NeebYs ChatGPT Integration

servers:
  - url: https://neebys-auth-production.up.railway.app

paths:
  /profile:
    get:
      operationId: getProfile
      summary: Get the currently connected NeebYs user's profile
      description: Use this whenever the user asks who they are, asks for their profile, asks if they are connected to NeebYs, or requests account information.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  app:
                    type: string
                  user:
                    type: string
                  connected:
                    type: boolean